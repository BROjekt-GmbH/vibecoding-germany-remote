services:
  # ---- Tailscale Sidecar ----
  # Stellt die Tailnet-Verbindung her und macht die App nur im Tailnet erreichbar.
  # HTTPS via Tailscale Serve — automatisches Let's Encrypt Zertifikat.
  tailscale:
    image: tailscale/tailscale:latest
    hostname: vcg-remote
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_CERT_DOMAIN=${TS_CERT_DOMAIN}
      - TS_HOSTNAME=${TS_HOSTNAME:-vcg-remote}
      - TZ=Europe/Berlin
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "--socket=/var/run/tailscale/tailscaled.sock", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Next.js App ----
  # Teilt sich das Netzwerk mit dem Tailscale-Container.
  # Ist dadurch NUR ueber die Tailscale-IP erreichbar.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Europe/Berlin
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-2000}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  tailscale-state:
  app-data:
